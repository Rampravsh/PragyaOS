        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credentialId
                - reason
              properties:
                credentialId:
                  type: string
                  format: uuid
                reason:
                  type: string
                  minLength: 1
                  maxLength: 1000
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Credential revoked successfully.
        "400":
          description: Credential is already revoked.
        "401":
          description: Authentication required.
        "403":
          description: Insufficient permissions.
        "404":
          description: Credential not found.
