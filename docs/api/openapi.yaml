    patch:
      summary: Update a certificate template (layout changes blocked once credentials
        issued)
      tags:
        - Credentials
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                active:
                  type: boolean
      responses:
        "200":
          description: Template updated successfully.
        "400":
          description: Layout modification blocked (template has issued credentials).
        "401":
          description: Authentication required.
        "403":
          description: Insufficient permissions.
        "404":
          description: Template not found.
  /credentials/issue:
    post:
      summary: Issue a credential certificate to a student
      tags:
        - Credentials
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - courseId
                - templateId
                - metadata
              properties:
                userId:
                  type: string
                  format: uuid
                courseId:
                  type: string
                  format: uuid
                templateId:
                  type: string
                  format: uuid
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
                metadata:
                  type: object
                  required:
                    - studentName
                    - courseTitle
                    - instructorName
                    - completionDate
                  properties:
                    studentName:
                      type: string
                    courseTitle:
                      type: string
                    instructorName:
                      type: string
                    completionDate:
                      type: string
                    customData:
                      type: object
                      additionalProperties: true
      responses:
        "201":
          description: Credential issued successfully.
        "400":
          description: Validation error or inactive template.
        "401":
          description: Authentication required.
        "403":
          description: Insufficient permissions.
        "404":
          description: Template not found.
        "409":
          description: Duplicate active credential exists for this user and course.
  /credentials/verify:
    post:
      summary: Verify a credential using its verification token (public endpoint)
      tags:
        - Credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verificationToken
                - source
              properties:
                verificationToken:
                  type: string
                  description: Raw verification token from the certificate URL
                source:
                  type: string
                  enum:
                    - PUBLIC_PAGE
                    - API
                    - ADMIN
      responses:
        "200":
          description: Credential verified successfully.
        "400":
          description: Credential is revoked or expired.
        "404":
          description: Verification token not found.
